---
- name: Provision Web Server
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create custom homepage
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Managed Web Node</title>
              <style>
                  body {
                      background-color: #0b0f19;
                      color: #f8fafc;
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                  }
                  .container {
                      text-align: center;
                      padding: 3rem;
                      border-radius: 16px;
                      background: rgba(30, 41, 59, 0.4);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      backdrop-filter: blur(12px);
                      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
                  }
                  .icon {
                      font-size: 3.5rem;
                      margin-bottom: 1rem;
                  }
                  h1 {
                      font-size: 2.2rem;
                      font-weight: 800;
                      margin: 0 0 0.5rem 0;
                      background: linear-gradient(135deg, #38bdf8, #818cf8);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                  }
                  p {
                      color: #94a3b8;
                      font-size: 1.1rem;
                      margin: 0;
                  }
                  .badge {
                      display: inline-block;
                      margin-top: 1.5rem;
                      background: rgba(52, 211, 153, 0.1);
                      border: 1px solid rgba(52, 211, 153, 0.3);
                      color: #34d399;
                      padding: 6px 16px;
                      border-radius: 20px;
                      font-size: 0.85rem;
                      font-weight: 600;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="icon">⚡</div>
                  <h1>Provisioned by Ansible</h1>
                  <p>Target Node: 192.168.56.11</p>
                  <div class="badge">● Managed & Healthy</div>
              </div>
          </body>
          </html>